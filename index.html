<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontier Automotives</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            background: #f5f5f5;
        }

        /* Center container */
        .wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;   /* horizontal center */
            align-items: center;       /* vertical center */
            overflow: hidden;
        }

        /* Image styling */
        .wrapper img {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            object-fit: contain;   /* keeps full image visible */
            display: block;
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <img src="main-image.png" alt="Frontier Automotives">
    </div>

</body>
</html>
