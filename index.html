<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontier Automotives</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
        }

        /* Full screen container */
        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f9; /* optional */
        }

        /* Image fills screen */
        .container img {
            width: 100%;
            height: 100%;
            object-fit: contain; /* change to 'cover' if you want full fill */
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="main-image.png" alt="Frontier Automotives">
    </div>

</body>
</html>
